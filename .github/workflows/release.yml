name: 🚀 Build & Publish SLTC GPA Companion Release

on:
  push:
    tags:
      - 'v*' # Triggers on any tag push starting with v (e.g. v1.0.0)
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag Name for Release (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write # Required for creating releases and uploading assets

jobs:
  build-and-release:
    name: 🏗️ Build APK and Release
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🐘 Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '9.3.1'
          cache-overwrite-existing: true
          validate-wrappers: false
          wrapper-validation-enabled: false

      - name: 📄 Create Dummy Google Services File
        run: |
          cat << 'EOF' > app/google-services.json
          {
            "project_info": {
              "project_number": "123456789012",
              "project_id": "sltc-gpa-companion-mock"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:123456789012:android:a1b2c3d4e5f6",
                  "android_client_info": {
                    "package_name": "com.aistudio.gpatracker.vbyfwa"
                  }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "mock_api_key_for_ci_compilation" }],
                "services": {}
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: 🧪 Run Unit & Robolectric Tests
        run: gradle :app:testDebugUnitTest

      - name: 📦 Build Release & Debug APKs
        run: |
          gradle :app:assembleRelease
          gradle :app:assembleDebug
        env:
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_PATH }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: 📁 Prepare Release Artifacts
        run: |
          mkdir -p release-artifacts
          
          # Extract version from tag or manual input
          TAG_NAME="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
          fi
          
          echo "Release Tag: $TAG_NAME"
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          
          # Dynamically search and copy any APKs found in release build output
          found_any=false
          
          if [ -d "app/build/outputs/apk/release" ]; then
            find app/build/outputs/apk/release/ -name "*.apk" | while read -r apk_path; do
              filename=$(basename "$apk_path")
              # Standardize names for the release
              if [ "$filename" = "app-release.apk" ] || [ "$filename" = "app-release-unsigned.apk" ]; then
                new_name="sltc-gpa-companion-$TAG_NAME-release.apk"
              else
                new_name="sltc-gpa-companion-$TAG_NAME-release-${filename#app-}"
              fi
              cp "$apk_path" "release-artifacts/$new_name"
              echo "Copied release APK to release-artifacts/$new_name"
              found_any=true
            done
          fi
          
          # Dynamically search and copy any APKs found in debug build output
          if [ -d "app/build/outputs/apk/debug" ]; then
            find app/build/outputs/apk/debug/ -name "*.apk" | while read -r apk_path; do
              filename=$(basename "$apk_path")
              if [ "$filename" = "app-debug.apk" ]; then
                new_name="sltc-gpa-companion-$TAG_NAME-debug.apk"
              else
                new_name="sltc-gpa-companion-$TAG_NAME-debug-${filename#app-}"
              fi
              cp "$apk_path" "release-artifacts/$new_name"
              echo "Copied debug APK to release-artifacts/$new_name"
              found_any=true
            done
          fi
          
          if [ "$found_any" = "false" ]; then
            echo "Error: No APK artifacts found in standard build directories."
            exit 1
          fi

      - name: 📝 Generate Release Notes
        id: release_notes
        run: |
          cat << 'EOF' > release-notes.md
          # 🚀 Release ${{ env.TAG_NAME }}
          
          Welcome to the official release of **SLTC GPA Companion**!
          
          This companion application helps SLTC students track grades, calculate cumulative GPA, and monitor degree compliance effortlessly using an offline-first approach.
          
          ## 📱 Release Artifacts
          We provide the following APK packages for simple sideload installation:
          
          - **`sltc-gpa-companion-${{ env.TAG_NAME }}-release.apk`**: Clean release build optimized for daily student usage.
          - **`sltc-gpa-companion-${{ env.TAG_NAME }}-debug.apk`**: Standard debug/testing build.
          
          *(Note: Signed with debug or upload keys as configured in the environment).*
          
          ---
          *To contribute, report issues, or view the degree configuration configurations, please visit our [GitHub Repository](https://github.com/${{ github.repository }}).*
          EOF

      - name: 📣 Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: SLTC GPA Companion ${{ env.TAG_NAME }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: |
            release-artifacts/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
